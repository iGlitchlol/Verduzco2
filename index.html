<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alerta Violeta Colima</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #6a0dad;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

img {
  width: 100%;
  max-height: 250px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

/* 🔥 MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  padding-top: 50px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.9);
}

.modal img {
  margin: auto;
  display: block;
  max-width: 90%;
  max-height: 80%;
}

.modal span {
  position: absolute;
  top: 20px;
  right: 35px;
  color: white;
  font-size: 40px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>🚨 Alerta Violeta Colima</header>

<div class="container" id="container">
Cargando reportes...
</div>

<!-- 🔥 MODAL -->
<div id="imageModal" class="modal">
  <span onclick="closeModal()">&times;</span>
  <img id="modalImg">
</div>

<script>
const API = "https://verduzco2.vercel.app/api/report";

// 🔥 abrir imagen
function openModal(src) {
  document.getElementById("imageModal").style.display = "block";
  document.getElementById("modalImg").src = src;
}

// 🔥 cerrar
function closeModal() {
  document.getElementById("imageModal").style.display = "none";
}

// 🔥 cargar datos
async function loadReports() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    const container = document.getElementById("container");
    container.innerHTML = "";

    if (!data || data.length === 0) {
      container.innerHTML = "<p>No hay reportes aún</p>";
      return;
    }

    data.forEach(r => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>📍 Ubicación:</b> ${r.lat}, ${r.lng}<br>
        <b>📅 Fecha:</b> ${r.fecha}<br><br>

        ${
          r.foto
            ? `<img src="data:image/jpeg;base64,${r.foto}" onclick="openModal(this.src)">`
            : ""
        }

        <iframe width="100%" height="200"
        src="https://maps.google.com/maps?q=${r.lat},${r.lng}&z=15&output=embed">
        </iframe>
      `;

      container.appendChild(div);
    });

  } catch (error) {
    console.error(error);
    document.getElementById("container").innerHTML =
      "Error cargando datos 😢";
  }
}

// 🔄 auto refresh
window.onload = () => {
  loadReports();
  setInterval(loadReports, 5000);
};
</script>

</body>
</html>
